services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: regression-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: regression-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-regression}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regression}
      POSTGRES_DB: ${POSTGRES_DB:-regression}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regression}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_data:
